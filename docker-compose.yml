version: '3.8'

# ==============================================================================
# QUY TẮC KIẾN TRÚC MẠNG ALPR:
# Tất cả 4 dịch vụ đều được liên kết chung vào một mạng bridge nội bộ (alpr-net).
# Sử dụng Volume mounts để code hot-reloading từ máy Host sang Container.
# ==============================================================================

services:
  # --------------------------------------------------------------------------
  # 1. AI ENGINE (Python / PyTorch)
  # Phụ trách nhận diện biển số (CNN) & OCR (CRNN) độc lập theo yêu cầu dự án.
  # --------------------------------------------------------------------------
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: alpr_ai_engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./ai-engine:/app
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - alpr-net
    # [TÙY CHỌN] Bỏ comment phần dưới để dùng GPU qua NVIDIA Container Toolkit
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # --------------------------------------------------------------------------
  # 2. BACKEND SERVICE (FastAPI)
  # API Gateway điều phối nghiệp vụ đỗ xe, giao tiếp khép kín với AI Engine.
  # --------------------------------------------------------------------------
  backend-service:
    build:
      context: ./backend-service
      dockerfile: Dockerfile
    container_name: alpr_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./backend-service:/app
    environment:
      # Liên kết mạng nội bộ bảo mật (không routing qua internet)
      - AI_ENGINE_URL=http://ai-engine:8000 
    networks:
      - alpr-net
    depends_on:
      - ai-engine

  # --------------------------------------------------------------------------
  # 3. FRONTEND DASHBOARD (React/Vite)
  # Giao diện người dùng cho bảo vệ / quản trị bãi đỗ xe.
  # --------------------------------------------------------------------------
  frontend-dashboard:
    build: 
      context: ./frontend-dashboard
      dockerfile: Dockerfile
    container_name: alpr_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      # Ánh xạ code trực tiếp để dev server (Vite) tự reload khi có thay đổi code
      - ./frontend-dashboard:/app
      # Ổn định node_modules bên trong container, tránh lỗi thư mục mồ côi
      - frontend_node_modules:/app/node_modules 
    networks:
      - alpr-net
    environment:
      # Trình duyệt khách hàng phải gọi tới API host của backend
      - VITE_API_URL=http://localhost:8080 

  # --------------------------------------------------------------------------
  # 4. SIMULATION TOOLS (Python / OpenCV)
  # Công cụ tạo Mock Stream RTSP/HTTP và mô phỏng I/O điều khiển barrier.
  # --------------------------------------------------------------------------
  simulation-tools:
    build:
      context: ./simulation-tools
      dockerfile: Dockerfile
    container_name: alpr_simulation
    restart: unless-stopped
    ports:
      - "8554:8554"
    volumes:
      - ./simulation-tools:/app
    networks:
      - alpr-net

# Khai báo Virtual Networks
networks:
  alpr-net:
    driver: bridge

# Khai báo Volumes duy trì vòng đời độc lập của container (vd thư viện frontend)
volumes:
  frontend_node_modules:
